included:
  - iOS/speedmeter/speedmeter
  - iOS/speedmeter/speedmeterTests
  - iOS/speedmeter/speedmeterUITests

excluded:
  - iOS/speedmeter/build

disabled_rules:
  - line_length
  - identifier_name
  - trailing_whitespace
  - todo
  # Xcode template generates lowercase type names (speedmeterApp, speedmeterTests)
  - type_name

large_tuple:
  warning: 3
  error: 5

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 800
  error: 1200

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25
